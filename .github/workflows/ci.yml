name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e . ruff pytest
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
